apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  labels:
    app.kubernetes.io/name: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus
    spec:
      serviceAccountName: nexus
      securityContext:
        fsGroup: 200
      containers:
        - name: nexus
          image: sonatype/nexus3:3.67.1
          imagePullPolicy: Always
          securityContext:
            runAsUser: 200
            runAsNonRoot: true
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: >-
                -Xms1200m -Xmx1200m
                -XX:MaxDirectMemorySize=2g
                -Djava.util.prefs.userRoot=/nexus-data/javaprefs
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
      volumes:
        - name: nexus-data
          persistentVolumeClaim:
            claimName: nexus-data
